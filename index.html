<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bazaraki — Избранное</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1" rel="stylesheet">
<style>
:root {
  /* M3 tokens */
  --md-sys-color-primary: #1a6b52;
  --md-sys-color-on-primary: #fff;
  --md-sys-color-primary-container: #a4f3d4;
  --md-sys-color-on-primary-container: #002117;
  --md-sys-color-surface: #fbfdf9;
  --md-sys-color-surface-container: #eef1ec;
  --md-sys-color-surface-container-low: #f3f6f1;
  --md-sys-color-surface-container-high: #e8ebe6;
  --md-sys-color-on-surface: #191c1a;
  --md-sys-color-on-surface-variant: #404943;
  --md-sys-color-outline: #707972;
  --md-sys-color-outline-variant: #c0c9c0;
  --md-sys-color-error: #ba1a1a;
  --md-sys-color-error-container: #ffdad6;
  --md-sys-color-shadow: rgba(0,0,0,.15);
  --md-sys-shape-corner-m: 12px;
  --md-sys-shape-corner-l: 16px;
  --md-sys-shape-corner-xl: 28px;
  --md-sys-typescale-body-large: 500 16px/24px 'Roboto',sans-serif;
  --md-sys-typescale-body-medium: 400 14px/20px 'Roboto',sans-serif;
  --md-sys-typescale-body-small: 400 12px/16px 'Roboto',sans-serif;
  --md-sys-typescale-label-large: 500 14px/20px 'Roboto',sans-serif;
  --md-sys-typescale-label-medium: 500 12px/16px 'Roboto',sans-serif;
  --md-sys-typescale-label-small: 500 11px/16px 'Roboto',sans-serif;
  --md-sys-typescale-title-medium: 500 16px/24px 'Roboto',sans-serif;
  --md-sys-typescale-headline-small: 400 24px/32px 'Roboto',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Roboto',sans-serif;background:var(--md-sys-color-surface);color:var(--md-sys-color-on-surface);overflow:hidden}

/* Layout */
.app{display:flex;height:100vh;position:relative}
#map{flex:1;z-index:0}

/* === DESKTOP SIDEBAR === */
.sidebar{
  width:400px;background:var(--md-sys-color-surface);
  display:flex;flex-direction:column;z-index:10;
  border-left:1px solid var(--md-sys-color-outline-variant);
}
.sidebar-head{
  padding:20px 24px 16px;flex-shrink:0;
  border-bottom:1px solid var(--md-sys-color-outline-variant);
}
.sidebar-head h1{font:var(--md-sys-typescale-headline-small);color:var(--md-sys-color-on-surface)}
.sidebar-head .meta{font:var(--md-sys-typescale-label-medium);color:var(--md-sys-color-on-surface-variant);margin-top:4px}

.search-bar{padding:12px 16px;flex-shrink:0}
.search-field{
  display:flex;align-items:center;gap:8px;
  background:var(--md-sys-color-surface-container-high);
  border-radius:var(--md-sys-shape-corner-xl);
  padding:0 16px;height:48px;
  border:none;width:100%;transition:background .2s;
}
.search-field:focus-within{background:var(--md-sys-color-surface-container)}
.search-field .material-symbols-outlined{color:var(--md-sys-color-on-surface-variant);font-size:20px}
.search-field input{
  flex:1;border:none;background:transparent;
  font:var(--md-sys-typescale-body-large);color:var(--md-sys-color-on-surface);
  outline:none;
}
.search-field input::placeholder{color:var(--md-sys-color-on-surface-variant)}

.list{flex:1;overflow-y:auto;padding:4px 8px 8px}

/* Card — M3 filled card */
.card{
  display:flex;gap:12px;padding:12px;margin-bottom:4px;
  border-radius:var(--md-sys-shape-corner-m);cursor:pointer;
  transition:background .12s;border:none;background:transparent;
}
.card:hover{background:var(--md-sys-color-surface-container-low)}
.card.on{background:var(--md-sys-color-primary-container)}

.card-img{
  width:88px;height:66px;border-radius:var(--md-sys-shape-corner-m);
  object-fit:cover;flex-shrink:0;background:var(--md-sys-color-surface-container);
}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.card-price{font:var(--md-sys-typescale-title-medium);color:var(--md-sys-color-on-surface)}
.card-price.sale{color:var(--md-sys-color-error)}
.card-type{font:var(--md-sys-typescale-body-small);color:var(--md-sys-color-on-surface-variant);margin-top:1px}
.card-loc{font:var(--md-sys-typescale-label-small);color:var(--md-sys-color-outline);margin-top:4px;display:flex;align-items:center;gap:2px}
.card-loc .material-symbols-outlined{font-size:14px}
.card-btn{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:6px;padding:0 12px;height:28px;
  background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);
  text-decoration:none;border-radius:var(--md-sys-shape-corner-xl);
  font:var(--md-sys-typescale-label-medium);transition:all .12s;
}
.card-btn:hover{box-shadow:0 1px 3px var(--md-sys-color-shadow)}
.card-btn .material-symbols-outlined{font-size:16px}

/* Popup — M3 */
.leaflet-popup-content-wrapper{border-radius:var(--md-sys-shape-corner-l)!important;padding:0!important;overflow:hidden;box-shadow:0 4px 16px var(--md-sys-color-shadow)!important}
.leaflet-popup-content{margin:0!important;width:256px!important}
.leaflet-popup-tip{box-shadow:none!important}
.p-img{width:100%;height:140px;object-fit:cover;display:block}
.p-b{padding:12px 16px 16px}
.p-price{font:var(--md-sys-typescale-title-medium);color:var(--md-sys-color-on-surface)}
.p-price.sale{color:var(--md-sys-color-error)}
.p-type{font:var(--md-sys-typescale-body-small);color:var(--md-sys-color-on-surface-variant);margin-top:2px}
.p-loc{font:var(--md-sys-typescale-label-small);color:var(--md-sys-color-outline);margin-top:6px;display:flex;align-items:center;gap:2px}
.p-loc .material-symbols-outlined{font-size:14px}
.p-link{
  display:flex;align-items:center;justify-content:center;gap:4px;
  margin-top:12px;height:36px;
  background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);
  text-decoration:none;border-radius:var(--md-sys-shape-corner-xl);
  font:var(--md-sys-typescale-label-large);transition:all .12s;
}
.p-link:hover{box-shadow:0 1px 3px var(--md-sys-color-shadow)}

/* Marker */
.mk{
  width:36px;height:36px;border-radius:50%;
  background:var(--md-sys-color-primary);border:2.5px solid #fff;
  box-shadow:0 2px 6px var(--md-sys-color-shadow);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font:600 13px/1 'Roboto',sans-serif;
  cursor:pointer;transition:transform .12s;
}
.mk:hover{transform:scale(1.15)}
.mk.sale{background:var(--md-sys-color-error)}

/* === MOBILE BOTTOM SHEET === */
@media(max-width:768px){
  .sidebar{display:none}

  .bottom-sheet{
    display:flex;flex-direction:column;
    position:fixed;left:0;right:0;bottom:0;
    z-index:1000;
    background:var(--md-sys-color-surface);
    border-radius:var(--md-sys-shape-corner-xl) var(--md-sys-shape-corner-xl) 0 0;
    box-shadow:0 -4px 24px var(--md-sys-color-shadow);
    max-height:85vh;
    transition:transform .3s cubic-bezier(.2,.9,.3,1);
    touch-action:none;
  }
  .bottom-sheet.collapsed{transform:translateY(calc(100% - 140px))}
  .bottom-sheet.peek{transform:translateY(calc(100% - 340px))}
  .bottom-sheet.full{transform:translateY(0)}

  .bs-handle{
    display:flex;justify-content:center;padding:12px 0 4px;flex-shrink:0;cursor:grab;
  }
  .bs-handle-bar{
    width:32px;height:4px;border-radius:2px;
    background:var(--md-sys-color-outline-variant);
  }

  .bs-head{
    padding:4px 20px 12px;flex-shrink:0;
    display:flex;justify-content:space-between;align-items:center;
  }
  .bs-head h2{font:var(--md-sys-typescale-title-medium);color:var(--md-sys-color-on-surface)}
  .bs-head .meta{font:var(--md-sys-typescale-label-small);color:var(--md-sys-color-outline)}

  .bs-search{padding:0 16px 12px;flex-shrink:0}

  .bs-list{flex:1;overflow-y:auto;padding:0 8px 24px;-webkit-overflow-scrolling:touch}
}

@media(min-width:769px){
  .bottom-sheet{display:none}
}

/* Leaflet overrides */
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px var(--md-sys-color-shadow)!important;border-radius:var(--md-sys-shape-corner-m)!important;overflow:hidden}
.leaflet-control-zoom a{background:var(--md-sys-color-surface)!important;color:var(--md-sys-color-on-surface)!important;border:none!important;width:40px!important;height:40px!important;line-height:40px!important;font-size:18px!important}
.leaflet-control-zoom a:hover{background:var(--md-sys-color-surface-container)!important}
</style>
</head>
<body>
<div class="app">
  <div id="map"></div>

  <!-- Desktop sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <h1>Избранное</h1>
      <div class="meta" id="cnt">22 объявления</div>
    </div>

        <input id="q" type="text" placeholder="Район, цена...">
      </div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <!-- Mobile bottom sheet -->
  <div class="bottom-sheet collapsed" id="bs">
    <div class="bs-handle" id="bsHandle"><div class="bs-handle-bar"></div></div>
    <div class="bs-head">
      <h2>Избранное</h2>
      <span class="meta" id="cntM">22</span>
    </div>
    <div class="bs-search">
      <div class="search-field">
        <span class="material-symbols-outlined">search</span>
        <input id="qM" type="text" placeholder="Район, цена...">
      </div>
    </div>
    <div class="bs-list" id="listM"></div>
  </div>
</div>

<script>
const D=[

{i:'6201580',t:'3-bed apartment',p:'€3,300',l:'Historical Center',lat:34.68054,lng:33.0527,u:'https://www.bazaraki.com/adv/6201580_3-bedroom-apartment-to-rent/',img:'https://cdn1.bazaraki.com/media/cache1/f0/38/f03809b0d3a39cae127c322ea4457793.webp'},

{i:'6286477',t:'3-bed apartment',p:'€3,000',l:'Limassol Marina',lat:34.68819,lng:33.06777,u:'https://www.bazaraki.com/adv/6286477_3-bedroom-apartment-to-rent/',img:'https://cdn1.bazaraki.com/media/cache1/56/33/56330011c8fff461fc966c255d1e031a.webp'},
{i:'5774686',t:'3-bed FOR SALE',p:'€430,000',l:'Neapolis',lat:34.68822,lng:33.06673,u:'https://www.bazaraki.com/adv/5774686_3-bedroom-apartment-for-sale/',img:'https://cdn1.bazaraki.com/media/cache1/2d/d9/2dd9c04c745980cb0a06613279d98c79.webp',sale:true},
{i:'6239433',t:'3-bed apartment',p:'€3,800',l:'Mouttagiaka',lat:34.70724,lng:33.11055,u:'https://www.bazaraki.com/adv/6239433_3-bedroom-apartment-to-rent/',img:'https://cdn1.bazaraki.com/media/cache1/8e/45/8e45394a9e968385e8bfc3a9ad827319.webp'},
{i:'6256108',t:'4-bed apartment',p:'€4,000',l:'Germasogeia',lat:34.69306,lng:33.08058,u:'https://www.bazaraki.com/adv/6256108_4-bedroom-apartment-to-rent/',img:'https://cdn1.bazaraki.com/media/cache1/b6/70/b6707d540ff9b691ac3f268dcf47f51f.webp'}
];

/* Map */
const map=L.map('map',{zoomControl:false}).setView([34.688,33.07],13);
L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>'
}).addTo(map);

let markers=[];
let filtered=[...D];
const isMobile=()=>window.innerWidth<=768;

function cardHTML(d,where){
  const s=d.sale?' sale':'';
  return '<img class="card-img" src="'+d.img+'" onerror="this.style.background=\'var(--md-sys-color-surface-container)\'">'+
    '<div class="card-body">'+
      '<div class="card-price'+s+'">'+d.p+'</div>'+
      '<div class="card-type">'+d.t+'</div>'+
      '<div class="card-loc"><span class="material-symbols-outlined">location_on</span>'+d.l+'</div>'+
      '<a href="'+d.u+'" target="_blank" class="card-btn" onclick="event.stopPropagation()"><span class="material-symbols-outlined">open_in_new</span>Bazaraki</a>'+
    '</div>';
}

function render(){
  markers.forEach(function(m){map.removeLayer(m)});
  markers=[];

  filtered.forEach(function(d,idx){
    var el=document.createElement('div');
    el.className='mk'+(d.sale?' sale':'');
    el.textContent=idx+1;

    var icon=L.divIcon({html:el.outerHTML,className:'',iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-22]});

    var popup=L.popup({maxWidth:280,minWidth:256,closeButton:true}).setContent(
      '<div><img class="p-img" src="'+d.img+'" onerror="this.style.display=\'none\'">'+
      '<div class="p-b">'+
        '<div class="p-price'+(d.sale?' sale':'')+'">'+d.p+'</div>'+
        '<div class="p-type">'+d.t+'</div>'+
        '<div class="p-loc"><span class="material-symbols-outlined">location_on</span>'+d.l+'</div>'+
        '<a href="'+d.u+'" target="_blank" class="p-link"><span class="material-symbols-outlined" style="font-size:16px">open_in_new</span> Открыть на Bazaraki</a>'+
      '</div></div>'
    );

    var marker=L.marker([d.lat,d.lng],{icon:icon}).addTo(map).bindPopup(popup);

    marker.on('click',function(){
      var sel=isMobile()?'#listM':'#list';
      document.querySelectorAll('.card').forEach(function(c){c.classList.remove('on')});
      var card=document.getElementById((isMobile()?'m':'d')+d.i);
      if(card){card.classList.add('on');card.scrollIntoView({behavior:'smooth',block:'nearest'})}
      if(isMobile()){setBsState('peek')}
    });

    markers.push(marker);
  });

  // Desktop list
  renderList(document.getElementById('list'),'d');
  // Mobile list
  renderList(document.getElementById('listM'),'m');

  var n=filtered.length;
  var word=n===1?'объявление':n<5?'объявления':'объявлений';
  document.getElementById('cnt').textContent=n+' '+word;
  document.getElementById('cntM').textContent=n;

  if(markers.length>0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.06));
}

function renderList(container,prefix){
  container.innerHTML='';
  filtered.forEach(function(d,idx){
    var card=document.createElement('div');
    card.className='card';
    card.id=prefix+d.i;
    card.innerHTML=cardHTML(d,prefix);
    card.addEventListener('click',function(){
      map.setView([d.lat,d.lng],16,{animate:true});
      markers[idx].openPopup();
      document.querySelectorAll('.card').forEach(function(c){c.classList.remove('on')});
      card.classList.add('on');
      var twin=document.getElementById((prefix==='d'?'m':'d')+d.i);
      if(twin)twin.classList.add('on');
    });
    container.appendChild(card);
  });
}

// Search
function onSearch(e){
  var q=e.target.value.toLowerCase();
  filtered=D.filter(function(d){
    return d.l.toLowerCase().indexOf(q)>-1||d.t.toLowerCase().indexOf(q)>-1||d.p.toLowerCase().indexOf(q)>-1;
  });
  render();
}
document.getElementById('q').addEventListener('input',onSearch);
document.getElementById('qM').addEventListener('input',onSearch);

/* === Bottom Sheet gesture === */
var bs=document.getElementById('bs');
var bsHandle=document.getElementById('bsHandle');
var bsState='collapsed';
var startY=0,startTranslate=0,currentTranslate=0,dragging=false;

function setBsState(state){
  bsState=state;
  bs.className='bottom-sheet '+state;
}

function getBsHeight(){return bs.offsetHeight}

bsHandle.addEventListener('touchstart',function(e){
  dragging=true;
  startY=e.touches[0].clientY;
  var rect=bs.getBoundingClientRect();
  startTranslate=rect.top-(window.innerHeight-getBsHeight());
  bs.style.transition='none';
},{passive:true});

document.addEventListener('touchmove',function(e){
  if(!dragging)return;
  var dy=e.touches[0].clientY-startY;
  currentTranslate=Math.max(0,startTranslate+dy);
  bs.style.transform='translateY('+currentTranslate+'px)';
},{passive:true});

document.addEventListener('touchend',function(){
  if(!dragging)return;
  dragging=false;
  bs.style.transition='';
  bs.style.transform='';

  var h=getBsHeight();
  var pct=currentTranslate/h;

  if(pct<0.25) setBsState('full');
  else if(pct<0.65) setBsState('peek');
  else setBsState('collapsed');
});

// Tap handle to toggle
bsHandle.addEventListener('click',function(){
  if(bsState==='collapsed') setBsState('peek');
  else if(bsState==='peek') setBsState('full');
  else setBsState('collapsed');
});

// Close BS on map tap (mobile)
map.on('click',function(){
  if(isMobile()&&bsState!=='collapsed') setBsState('collapsed');
});

render();
</script>
</body>
</html>
